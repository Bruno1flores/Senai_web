<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Event Registration Form</title>
    <link rel="stylesheet" href="atividade5css.css">
</head>
<body>

<div class="container">
    <div class="form-box">
        <div class="header">
            <h2>EVENT REGISTRATION FORM</h2>
        </div>

        <form>
            <!-- Nome -->
            <div class="row">
                <label>Name</label>
                <div class="input-group">
                    <input type="text" placeholder="First Name">
                    <input type="text" placeholder="Last Name">
                </div>
            </div>

            <!-- Company -->
            <div class="row">
                <label>Company</label>
                <input type="text">
            </div>

            <!-- Email -->
            <div class="row">
                <label>Email</label>
                <input type="email">
            </div>

            <!-- Phone -->
            <div class="row">
                <label>Phone</label>
                <div class="input-group">
                    <input type="text" placeholder="Area Code">
                    <input type="text" placeholder="Phone Number">
                </div>
            </div>

            <!-- Subject -->
            <div class="row">
                <label>Subject</label>
                <select>
                    <option>Choose option</option>
                    <option>Support</option>
                    <option>Sales</option>
                    <option>General</option>
                </select>
            </div>

            <!-- Radio -->
            <div class="row">
                <label>Are you an existing customer?</label>
                <div class="radio-group">
                    <label><input type="radio" name="customer"> Yes</label>
                    <label><input type="radio" name="customer"> No</label>
                </div>
            </div>

            <!-- Button -->
            <button type="submit">REGISTER</button>

        </form>
    </div>
</div>

</body>
</html>
